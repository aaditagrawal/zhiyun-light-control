name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra ble --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Compile
        run: uv run python -m compileall -q src tests examples/sdk_quickstart.py

      - name: Check no explicit Any in source or tests
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import re
          import sys

          pattern = re.compile(r"\bAny\b|typing\.Any|from typing import .*Any")
          matches = []
          for root in (Path("src"), Path("tests")):
              for path in root.rglob("*.py"):
                  for line_number, line in enumerate(path.read_text().splitlines(), 1):
                      if pattern.search(line):
                          matches.append(f"{path}:{line_number}:{line}")
          if matches:
              print("\n".join(matches))
              sys.exit(1)
          PY

      - name: Build package
        run: uv build
